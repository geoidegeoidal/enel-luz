name: update-data

on:
  schedule:
    # Cada 5 min (best-effort: GitHub puede atrasarlo bajo carga)
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Descargar datos de Enel (espejo)
        run: node scripts/fetch-data.mjs

      - name: Commit si hay cambios
        id: commit
        run: |
          git config user.name "enel-luz-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "sin cambios"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "data: update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: fetch
    if: needs.fetch.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
