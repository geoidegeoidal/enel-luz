name: update-data

on:
  schedule:
    # Cada 5 min (best-effort: GitHub puede atrasarlo bajo carga)
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Descargar datos de Enel (espejo)
        run: node scripts/fetch-data.mjs

      - name: Commit si hay cambios
        run: |
          git config user.name "enel-luz-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "sin cambios"
          else
            git commit -m "data: update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
